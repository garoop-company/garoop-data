name: Codex Daily Plan

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Target date (YYYY-MM-DD). Empty = today in JST."
        required: false
        type: string
      groq_model:
        description: "Groq model name (example: llama-3.1-8b-instant)"
        required: false
        default: "llama-3.1-8b-instant"
        type: string
  schedule:
    - cron: "0 17 * * *"

permissions:
  contents: write

concurrency:
  group: codex-daily-plan
  cancel-in-progress: true

jobs:
  run-daily-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Tokyo
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ github.event.inputs.groq_model || 'llama-3.1-8b-instant' }}
      GROQ_MODEL_CANDIDATES: ${{ github.event.inputs.groq_model || 'llama-3.1-8b-instant' }},llama-3.3-70b-versatile,gemma2-9b-it

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve target date
        id: date
        run: |
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE="$(TZ=Asia/Tokyo date +%F)"
          fi
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"

      - name: Run daily planner
        run: |
          chmod +x scripts/codex/run-daily-plan.sh
          ./scripts/codex/run-daily-plan.sh "${{ steps.date.outputs.target_date }}"

      - name: Commit and push
        run: |
          TARGET_DATE="${{ steps.date.outputs.target_date }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/data/personnel.json \
            public/data/schedule.json \
            "public/data/daily/tasks/${TARGET_DATE}.json" \
            "public/data/daily/schedules/${TARGET_DATE}.json"
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(codex): update daily plan for ${TARGET_DATE}"
          git push
