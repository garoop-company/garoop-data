name: Sync AI Kids Land Blog

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync blog data
        run: node scripts/sync-ai-kids-land-blog.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/blog/ai_kids_land data/ai_kids_land-blog-rss-state.json
          git commit -m "chore: sync ai_kids_land blog"
          git push
